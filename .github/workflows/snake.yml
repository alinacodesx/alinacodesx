name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: alinacodesx
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push snake
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update snake"
          branch: output
          create_branch: true
          file_pattern: dist/*
